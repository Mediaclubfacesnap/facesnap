# PostgreSQL WAL Archiving Configuration Template
# Place these settings in your postgresql.conf to enable Point-In-Time Recovery (PITR).

# Write Ahead Log settings
wal_level = replica
archive_mode = on

# Archive Command
# This command copies completed WAL segments to the designated backup folder.
# For local containerized simulation, we store them in `/app/backups/wal`.
# In production, replace this with a secure copy command to an S3/Cloud Storage bucket.
archive_command = 'test ! -f /app/backups/wal/%f && cp %p /app/backups/wal/%f'

# Recovery settings (for restoring)
# Set restore_command to pull archived transaction logs:
# restore_command = 'cp /app/backups/wal/%f %p'
